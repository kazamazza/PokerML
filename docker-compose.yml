services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: pokerMLUser
      POSTGRES_PASSWORD: MLWhisk777!
      POSTGRES_DB: pokerMLdb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro

  ml_service:
    build: .
    env_file: .env.docker
    depends_on:
      - db
    command: >
      sh -c "
        sleep 5 &&
        python db/init.py &&
        python scripts/check_and_generate_hand_ranges.py
      "
    volumes:
      - .:/app
    environment:
      INSIDE_DOCKER: "1"
      PYTHONPATH: /app

volumes:
  postgres_data: