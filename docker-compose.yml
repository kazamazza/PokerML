services:
  db:
    image: postgres:15
    env_file: .env
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  app:
    build: .
    env_file: .env
    depends_on:
      - db
    command: >
      sh -c "
        sleep 5 &&
        python db/init.py &&
        python scripts/check_and_generate_hand_ranges.py
      "